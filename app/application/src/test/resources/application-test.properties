# Test configuration
quarkus.application.name=multi-module-quarkus-test
quarkus.http.port=8081

# REST Client for Advice Slip API - mock for tests
quarkus.rest-client.advice-slip.url=https://api.adviceslip.com
quarkus.rest-client.advice-slip.connect-timeout=15000
quarkus.rest-client.advice-slip.read-timeout=30000

# Cache configuration
mma.cache.enabled=false

# H2 Database
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
quarkus.datasource.jdbc.driver=org.h2.Driver
quarkus.h2.devservices.enabled=false

# Logging
quarkus.log.level=INFO